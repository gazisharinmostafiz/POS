name: Deploy Draft

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  build-test-and-deploy:
    name: Build, test, and deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo, pdo_pgsql, redis, zip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: php artisan test

      - name: Backup before production update
        if: ${{ inputs.environment == 'production' }}
        run: php artisan release:backup-before-update

      - name: Enable release maintenance
        if: ${{ inputs.environment == 'production' }}
        run: php artisan release:maintenance on --message="Production update in progress."

      - name: Deploy application placeholder
        run: |
          echo "Add rsync, SSH, container registry, or platform deploy command here."
          echo "Use GitHub environment secrets. Do not commit credentials."

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Check application health
        run: |
          echo "Call the deployed /health endpoint here."
          echo "Example: curl --fail https://example.com/health"

      - name: Disable release maintenance
        if: ${{ always() && inputs.environment == 'production' }}
        run: php artisan release:maintenance off --message="Production update complete."
